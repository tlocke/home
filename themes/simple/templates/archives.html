{% extends "base.html" %}

{% block title %}{{ SITENAME }} - Archives{% endblock %}

{% block content %}

  {% set years = articles | map(attribute='date.year') | unique | sort | reverse %}
  <ul>
    {% for year in years %}
      <li><a href="{{ SITEURL }}/posts/{{ year }}/">{{ year }}</a></li>
    {% endfor %}
  </ul>

{% endblock %}
